<!DOCTYPE html>
<html>
<head>
  <title>AI Resume Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Resume Generator</h1>

  <input id="name" placeholder="Your Name"><br>
  <input id="education" placeholder="Education"><br>
  <input id="skills" placeholder="Skills"><br>
  <input id="experience" placeholder="Experience"><br>
  <input id="field" placeholder="Field of Interest"><br>

  <button onclick="generateResume()">Generate Resume</button>

  <h2>Resume:</h2>
  <pre id="resumeOutput"></pre>

  <h2>Interview Questions:</h2>
  <pre id="interviewOutput"></pre>

  <script src="script.js"></script>

</body>
</html>
