<!DOCTYPE html>
<html>
<head>
  <title>AI Resume Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-lg">
  <h1 class="text-2xl font-bold mb-4 text-center">AI Resume Builder</h1>

  <input id="name" class="w-full p-2 border mb-2 rounded" placeholder="Name">
  <input id="education" class="w-full p-2 border mb-2 rounded" placeholder="Education">
  <input id="skills" class="w-full p-2 border mb-2 rounded" placeholder="Skills">
  <input id="experience" class="w-full p-2 border mb-2 rounded" placeholder="Experience">
  <input id="field" class="w-full p-2 border mb-4 rounded" placeholder="Field">

  <button onclick="generateResume()" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">
    Generate Resume
  </button>

  <pre id="resumeOutput" class="mt-4 bg-gray-50 p-3 rounded text-sm"></pre>
  <pre id="interviewOutput" class="mt-4 bg-gray-50 p-3 rounded text-sm"></pre>

  <button onclick="downloadPDF()" class="mt-4 w-full bg-green-500 text-white p-2 rounded hover:bg-green-600">
    Download PDF
  </button>
</div>

<script src="script.js"></script>
</body>
</html>
